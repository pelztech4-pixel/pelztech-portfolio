<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent | Pelztech</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#020b1c;
      font-family:Arial, sans-serif;
      color:white;
    }

    .success-box{
      width:90%;
      max-width:500px;
      padding:50px;
      border-radius:24px;
      background:linear-gradient(145deg,#03142f,#07244f);
      border:1px solid rgba(0,183,255,0.25);
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,0.45);
    }

    h1{
      font-size:42px;
      margin-bottom:15px;
      color:#00b7ff;
    }

    p{
      font-size:18px;
      line-height:1.7;
      color:#c7d7ea;
      margin-bottom:30px;
    }

    a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:14px 28px;
      border-radius:999px;
      background:#00b7ff;
      color:white;
      text-decoration:none;
      font-weight:700;
    }

    a:hover{
      transform:translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="success-box">
    <h1>Message Sent</h1>

    <p>
      Thank you for contacting Pelztech.
      We will get back to you shortly.
    </p>

    <a href="index.html">Back to Website</a>
  </div>

</body>
</html>
